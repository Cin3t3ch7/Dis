<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Disney Search Pro</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a0e1a;
            --primary-darker: #060810;
            --primary-navy: #0d1525;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-blue-glow: rgba(59, 130, 246, 0.4);
            --light-blue: #60a5fa;
            --lighter-blue: #93c5fd;
            --light-text: #e2e8f0;
            --gray-text: #64748b;
            --muted-text: #475569;
            --border-color: rgba(59, 130, 246, 0.2);
            --border-color-hover: rgba(59, 130, 246, 0.4);
            --card-bg: rgba(13, 21, 37, 0.85);
            --card-bg-solid: #0d1525;
            --error-color: #ef4444;
            --success-color: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: var(--primary-dark);
            color: var(--light-text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background image with low opacity */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/stitch-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.12;
            z-index: -2;
            filter: brightness(0.5) contrast(1.1);
        }

        /* Gradient overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                    rgba(10, 14, 26, 0.7) 0%,
                    rgba(10, 14, 26, 0.5) 50%,
                    rgba(10, 14, 26, 0.8) 100%);
            z-index: -1;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(59, 130, 246, 0.1);
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Terminal style header */
        .terminal-header {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .terminal-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: var(--gray-text);
            margin-bottom: 1.25rem;
            letter-spacing: 0.02em;
        }

        .terminal-text .prompt {
            color: var(--accent-blue);
        }

        .terminal-text .command {
            color: var(--light-blue);
        }

        .login-header h1 {
            color: var(--light-text);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .login-header p {
            color: var(--gray-text);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Info box - Telegram style */
        .info-box {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--accent-blue);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.75rem;
        }

        .info-box-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-blue);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .info-box-title .icon {
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
        }

        .info-box p {
            color: var(--muted-text);
            font-size: 0.8rem;
            line-height: 1.5;
        }

        /* Form styles */
        .form-group {
            margin-bottom: 1.25rem;
            transition: all 0.3s ease;
        }

        .form-group.hidden {
            display: none;
            opacity: 0;
        }

        .form-group.active {
            display: block;
            opacity: 1;
            animation: fadeIn 0.4s ease-out;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--light-text);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group label .label-icon {
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
        }

        .input-container {
            position: relative;
            background: var(--primary-darker);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .input-container:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .input-container input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            background: transparent;
            color: var(--light-text);
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            text-align: center;
        }

        .input-container input::placeholder {
            color: var(--muted-text);
            font-family: 'Inter', sans-serif;
        }

        .input-help {
            font-size: 0.75rem;
            color: var(--gray-text);
            margin-top: 0.5rem;
            text-align: center;
        }

        /* Button styles */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent-blue);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent-blue-hover);
            box-shadow: 0 8px 25px var(--accent-blue-glow);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn .btn-icon {
            font-size: 1.1rem;
        }

        .btn .loading-text {
            display: none;
        }

        .btn.loading .normal-text {
            display: none;
        }

        .btn.loading .loading-text {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Back button */
        #backBtnContainer {
            text-align: center;
            margin-top: 1rem;
        }

        #backBtn {
            color: var(--gray-text);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        #backBtn:hover {
            color: var(--accent-blue);
        }

        /* Message styles */
        .message {
            margin-top: 1rem;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 3px solid;
            display: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border-left-color: var(--success-color);
            color: var(--success-color);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: var(--error-color);
            color: var(--error-color);
        }

        /* Features section */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .feature-item {
            text-align: center;
            padding: 1rem 0.5rem;
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--border-color-hover);
        }

        .feature-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .feature-text {
            font-size: 0.7rem;
            color: var(--gray-text);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .footer-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--gray-text);
        }

        .footer-text .prompt {
            color: var(--accent-blue);
        }

        .footer-text .version {
            color: var(--muted-text);
        }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--accent-blue);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* OTP Input special style */
        #otpInput {
            letter-spacing: 0.5em;
            font-weight: 700;
            font-size: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .login-container {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .feature-item {
                padding: 0.75rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
            }

            .feature-icon {
                margin-bottom: 0;
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="terminal-header">
            <div class="terminal-text">
                <span class="prompt">&gt;_</span> <span class="prompt">&gt;</span> <span
                    class="command">auth.telegram.init()</span>
            </div>
        </div>

        <div class="info-box">
            <div class="info-box-title">
                <span class="icon">○</span>
                Autenticación Telegram
            </div>
            <p>Ingresa tu ID de Telegram. Recibirás un código OTP de 6 dígitos a través del bot de la plataforma.</p>
        </div>

        <form id="loginForm">
            <div id="step-id" class="form-group active">
                <label for="telegramId">
                    <span class="label-icon">#</span>
                    Telegram ID
                </label>
                <div class="input-container">
                    <input type="text" id="telegramId" name="telegramId" placeholder="ID: 1234567890" autocomplete="off"
                        maxlength="15">
                </div>
            </div>

            <div id="step-otp" class="form-group hidden">
                <label for="otpInput">
                    <span class="label-icon">#</span>
                    Código de Verificación
                </label>
                <div class="input-container">
                    <input type="text" id="otpInput" name="otpInput" placeholder="000000" autocomplete="off"
                        maxlength="6">
                </div>
                <div class="input-help">Código de 6 dígitos enviado a tu Telegram</div>
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <span class="normal-text">
                    <span class="btn-icon">✈</span>
                    Enviar código por Telegram
                </span>
                <span class="loading-text">
                    <span class="loading-spinner"></span>
                    Procesando...
                </span>
            </button>
        </form>

        <div id="backBtnContainer" style="display: none;">
            <a href="#" id="backBtn">← Volver</a>
        </div>

        <div id="message" class="message"></div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">🏰</div>
                <div class="feature-text">Disney Plus</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🏠</div>
                <div class="feature-text">Household</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎭</div>
                <div class="feature-text">My Disney OTP</div>
            </div>
        </div>

        <div class="login-footer">
            <div class="footer-text">
                <span class="prompt">&gt;</span> <span class="version">Disney Search Pro 2.0.0</span> | Telegram
                Auth<span class="cursor-blink"></span>
            </div>
        </div>
    </div>

    <script>
        let csrfToken = null;
        let isLoading = false;
        let currentStep = 'id'; // 'id' o 'otp'
        let userId = null;

        document.addEventListener('DOMContentLoaded', function () {
            console.log('🚀 Iniciando Disney Search Pro Login...');
            initializeApp();
        });

        async function initializeApp() {
            try {
                await obtenerCSRFToken();
                setupEventListeners();
                console.log('✅ Aplicación inicializada correctamente');
            } catch (error) {
                console.error('❌ Error inicializando aplicación:', error);
                showMessage('error', 'Error inicializando. Recarga la página.');
            }
        }

        async function obtenerCSRFToken() {
            try {
                const response = await fetch('/api/csrf-token', { method: 'GET', credentials: 'include' });
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                const data = await response.json();
                csrfToken = data.csrfToken;
            } catch (error) {
                console.error('❌ Error obteniendo token CSRF:', error);
            }
        }

        function setupEventListeners() {
            const form = document.getElementById('loginForm');
            const telegramIdInput = document.getElementById('telegramId');
            const otpInput = document.getElementById('otpInput');
            const backBtn = document.getElementById('backBtn');

            form.addEventListener('submit', handleFormSubmit);

            telegramIdInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });

            otpInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });

            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showStep('id');
            });
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            if (isLoading) return;

            if (currentStep === 'id') {
                await handleLoginRequest();
            } else {
                await handleOtpVerification();
            }
        }

        async function handleLoginRequest() {
            const telegramId = document.getElementById('telegramId').value.trim();
            if (!telegramId || telegramId.length < 5) {
                showMessage('error', 'Ingresa un ID válido');
                return;
            }

            setLoading(true);
            userId = telegramId; // Guardar temporalmente

            try {
                if (!csrfToken) await obtenerCSRFToken();

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'include',
                    body: JSON.stringify({ telegramId: telegramId, csrfToken: csrfToken })
                });

                const data = await response.json();

                if (response.ok && data.success && data.step === 'otp_verification') {
                    showMessage('success', 'Código enviado ✓');
                    showStep('otp');
                } else {
                    showMessage('error', data.error || 'Error');
                }
            } catch (error) {
                showMessage('error', 'Error de conexión');
            } finally {
                setLoading(false);
            }
        }

        async function handleOtpVerification() {
            const otp = document.getElementById('otpInput').value.trim();
            if (!otp || otp.length !== 6) {
                showMessage('error', 'Código inválido');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
                    credentials: 'include',
                    body: JSON.stringify({ userId: userId, otp: otp })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage('success', '¡Verificado! Ingresando...');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showMessage('error', data.error || 'Código incorrecto');
                }
            } catch (error) {
                showMessage('error', 'Error de conexión');
            } finally {
                setLoading(false);
            }
        }

        function showStep(step) {
            currentStep = step;
            const stepId = document.getElementById('step-id');
            const stepOtp = document.getElementById('step-otp');
            const btnText = document.querySelector('.normal-text');
            const backBtnContainer = document.getElementById('backBtnContainer');

            if (step === 'id') {
                stepId.classList.remove('hidden');
                stepId.classList.add('active');
                stepOtp.classList.add('hidden');
                stepOtp.classList.remove('active');
                btnText.innerHTML = '<span class="btn-icon">✈</span> Enviar código por Telegram';
                backBtnContainer.style.display = 'none';
                setTimeout(() => document.getElementById('telegramId').focus(), 100);
            } else {
                stepId.classList.add('hidden');
                stepId.classList.remove('active');
                stepOtp.classList.remove('hidden');
                stepOtp.classList.add('active');
                btnText.innerHTML = '<span class="btn-icon">✓</span> Verificar';
                backBtnContainer.style.display = 'block';
                setTimeout(() => document.getElementById('otpInput').focus(), 100);
            }
        }

        function setLoading(loading) {
            isLoading = loading;
            const btn = document.getElementById('loginBtn');
            const inputs = document.querySelectorAll('input');

            btn.disabled = loading;
            inputs.forEach(i => i.disabled = loading);

            if (loading) btn.classList.add('loading');
            else btn.classList.remove('loading');
        }

        function showMessage(type, text, duration = 5000) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            setTimeout(() => messageDiv.style.display = 'none', duration);
        }
    </script>
</body>

</html>
